# Fly.io configuration for Sequins Web
app = "sequins"
primary_region = "sjc"

[build]
  dockerfile = "crates/sequins-web/Dockerfile"

[env]
  LEPTOS_SITE_ADDR = "0.0.0.0:8080"
  LEPTOS_SITE_ROOT = "/app/site"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "get"
    path = "/"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
