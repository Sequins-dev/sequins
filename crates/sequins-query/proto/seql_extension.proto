syntax = "proto3";
package seql_extension;

// SeqlExtension is embedded in Substrait Plan.advanced_extensions.enhancement
// as a protobuf Any, allowing any Flight SQL client to send a Substrait plan
// and receive Arrow IPC streams with full SeQL semantics.
message SeqlExtension {
  // UI rendering hint (table, timeseries, heatmap, etc.)
  string response_shape = 1;
  // Primary signal type (spans, logs, datapoints, etc.)
  string signal = 2;
  // Time range for the query
  TimeRange time_range = 3;
  // Query execution mode
  QueryMode mode = 4;
  // Optional cursor for live query continuation (WAL sequence number)
  optional uint64 cursor = 5;
  // Aliases for auxiliary plan roots (relations[1], [2], etc.)
  // auxiliary_aliases[i] corresponds to plan.relations[i+1]
  repeated string auxiliary_aliases = 6;
  // Signal names for auxiliary plan roots (relations[1], [2], etc.)
  // auxiliary_signals[i] is the signal type for plan.relations[i+1]
  // Used by the server to route live WAL broadcasts to the right table.
  repeated string auxiliary_signals = 7;
  // Complete serialized Substrait Plan bytes for each auxiliary merge root.
  // Each entry is a self-contained Plan (with its own extensions) for one
  // auxiliary merge root. auxiliary_plan_bytes[i] corresponds to
  // auxiliary_aliases[i] and auxiliary_signals[i].
  // This replaces the old approach of pushing aux relations into plan.relations,
  // which discarded the auxiliary extensions (causing function-not-found errors).
  repeated bytes auxiliary_plan_bytes = 8;
}

// Time range specification
message TimeRange {
  oneof range {
    // Sliding window: look back this many nanoseconds from now
    uint64 sliding_window_ns = 1;
    // Absolute range with explicit start/end
    AbsoluteRange absolute = 2;
  }
}

// Absolute time range with explicit start and end
message AbsoluteRange {
  uint64 start_ns = 1;
  uint64 end_ns = 2;
}

// Query execution mode
enum QueryMode {
  SNAPSHOT = 0;
  LIVE = 1;
}
