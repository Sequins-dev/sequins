language = "C"
pragma_once = true
include_guard = "SEQUINS_FFI_H"
autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not edit manually. */"

# Forward declare opaque types
after_includes = """
/* Opaque type for std::ffi::CString */
typedef struct CString CString;
"""

[parse]
parse_deps = true
include = ["sequins-ffi"]
