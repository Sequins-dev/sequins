[package]
name = "sequins-wal"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
description = "Write-Ahead Log for Sequins — zero workspace deps, embeddable"

[dependencies]
# OpenTelemetry proto (OTLP request types in WalPayload)
