<div id="profiles-view" class="flex flex-col h-full overflow-hidden" data-init="initFlamegraph()">
  <!-- Zoom indicator bar (hidden until a frame is zoomed) -->
  <div id="fg-zoom-bar" class="hidden items-center gap-2 px-3 py-1.5 bg-zinc-900 border-b border-zinc-700 text-xs text-zinc-300 shrink-0">
    <svg class="w-3.5 h-3.5 text-zinc-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/></svg>
    <span class="text-zinc-400">Zoomed to:</span>
    <span id="fg-zoom-name" class="font-mono text-blue-400 truncate max-w-xs"></span>
    <button id="fg-zoom-reset" class="ml-auto px-2 py-0.5 text-xs border border-zinc-600 rounded bg-zinc-800 text-zinc-300 hover:bg-zinc-700 cursor-pointer shrink-0">Reset</button>
  </div>

  <!-- Flamegraph SVG container -->
  <div id="flamegraph" class="overflow-auto p-2" style="flex:1 1 0;min-height:0">
    <div class="flex items-center justify-center h-48 text-zinc-500">Loading flamegraph…</div>
  </div>

  <!-- Metadata detail pane (hidden until a frame is selected) -->
  <div id="fg-detail" class="hidden border-t border-zinc-700 bg-zinc-900 shrink-0 overflow-y-auto" style="max-height:40%">
    <div class="p-3">
      <div class="flex items-start justify-between gap-2 mb-3">
        <h3 id="fg-detail-fn" class="text-sm font-mono text-zinc-100 break-all"></h3>
        <button id="fg-detail-close" class="shrink-0 text-zinc-500 hover:text-zinc-300 cursor-pointer mt-0.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="grid grid-cols-[auto_1fr] gap-x-4 gap-y-1 text-xs mb-3">
        <div class="text-zinc-500">Self</div>
        <div id="fg-detail-self" class="text-zinc-300 font-mono"></div>
        <div class="text-zinc-500">Total</div>
        <div id="fg-detail-total" class="text-zinc-300 font-mono"></div>
        <div class="text-zinc-500">File</div>
        <div id="fg-detail-file" class="text-zinc-400 font-mono text-xs break-all"></div>
      </div>
      <div class="text-zinc-500 text-xs mb-1.5">Call Stack</div>
      <div id="fg-detail-stack" class="text-xs font-mono space-y-0.5 overflow-x-auto"></div>
    </div>
  </div>
</div>
