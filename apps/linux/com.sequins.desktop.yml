app-id: com.sequins.desktop
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm18
command: sequins-desktop

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=xdg-run/dconf
  - --talk-name=ca.desrt.dconf

build-options:
  prepend-path: /usr/lib/sdk/llvm18/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm18/lib
  env:
    CARGO_HOME: /run/build/sequins-desktop/cargo
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    LIBCLANG_PATH: /usr/lib/sdk/llvm18/lib
    PROTOC_INCLUDE: /app/share/protoc/include

modules:
  - name: protoc
    buildsystem: simple
    build-commands:
      - unzip -j protoc-$(uname -m).zip bin/protoc -d /app/bin/
      - mkdir -p /app/share/protoc
      - unzip protoc-$(uname -m).zip 'include/*' -d /app/share/protoc
    sources:
      - type: file
        url: https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip
        sha256: 3e866620c5be27664f3d2fa2d656b5f3e09b5152b42f1bedbf427b333e90021a
        dest-filename: protoc-x86_64.zip
      - type: file
        url: https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-aarch_64.zip
        sha256: 6427349140e01f06e049e707a58709a4f221ae73ab9a0425bc4a00c8d0e1ab32
        dest-filename: protoc-aarch64.zip
    cleanup:
      - /bin/protoc
      - /share/protoc

  - name: rust
    buildsystem: simple
    build-options:
      no-debuginfo: true
    build-commands:
      - |
        case "$(uname -m)" in
          x86_64)
            target=x86_64-unknown-linux-gnu
            archive=rust-x86_64.tar.xz
            ;;
          aarch64)
            target=aarch64-unknown-linux-gnu
            archive=rust-aarch64.tar.xz
            ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac
        tar -xf "$archive"
        "rust-1.96.1-$target/install.sh" --prefix=/app --disable-ldconfig
    sources:
      - type: file
        url: https://static.rust-lang.org/dist/rust-1.96.1-x86_64-unknown-linux-gnu.tar.xz
        sha256: d29ccb1559a177c4e72291f6e5f629de7fe8885e7521ca47802627544b121e95
        dest-filename: rust-x86_64.tar.xz
      - type: file
        url: https://static.rust-lang.org/dist/rust-1.96.1-aarch64-unknown-linux-gnu.tar.xz
        sha256: 3abcb9489d001d95f30e8cfe68118be85afb0adbf0a9b21438909719689c08fb
        dest-filename: rust-aarch64.tar.xz

  - name: sequins-desktop
    buildsystem: simple
    build-commands:
      - rustc --version
      - cargo update --workspace --offline
      - cargo build --release --offline --package sequins-linux
      - install -Dm755 target/release/sequins-desktop /app/bin/sequins-desktop
      - install -Dm644 apps/linux/data/com.sequins.desktop.desktop /app/share/applications/com.sequins.desktop.desktop
      - install -Dm644 apps/linux/data/com.sequins.desktop.metainfo.xml /app/share/metainfo/com.sequins.desktop.metainfo.xml
      - install -Dm644 apps/linux/data/icons/hicolor/scalable/apps/com.sequins.desktop.svg /app/share/icons/hicolor/scalable/apps/com.sequins.desktop.svg
    sources:
      - type: dir
        path: ../..
      - cargo-sources.json
    cleanup:
      - /bin/cargo
      - /bin/cargo-clippy
      - /bin/cargo-fmt
      - /bin/clippy-driver
      - /bin/rust-gdb
      - /bin/rust-gdbgui
      - /bin/rust-lldb
      - /bin/rustc
      - /bin/rustdoc
      - /bin/rustfmt
      - /lib/rustlib
      - /share/doc/rust
      - /share/man/man1/cargo*
      - /share/man/man1/rust*
