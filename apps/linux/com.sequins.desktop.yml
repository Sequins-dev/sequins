app-id: com.sequins.desktop
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: sequins-desktop

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --device=dri
  - --filesystem=xdg-run/dconf
  - --talk-name=ca.desrt.dconf

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/sequins-desktop/cargo
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
    PROTOC_INCLUDE: /app/share/protoc/include

modules:
  - name: protoc
    buildsystem: simple
    build-commands:
      - unzip -j protoc-$(uname -m).zip bin/protoc -d /app/bin/
      - mkdir -p /app/share/protoc
      - unzip protoc-$(uname -m).zip 'include/*' -d /app/share/protoc
    sources:
      - type: file
        url: https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip
        sha256: 3e866620c5be27664f3d2fa2d656b5f3e09b5152b42f1bedbf427b333e90021a
        dest-filename: protoc-x86_64.zip
      - type: file
        url: https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-aarch_64.zip
        sha256: 6427349140e01f06e049e707a58709a4f221ae73ab9a0425bc4a00c8d0e1ab32
        dest-filename: protoc-aarch64.zip
    cleanup:
      - /bin/protoc
      - /share/protoc

  - name: sequins-desktop
    buildsystem: simple
    build-commands:
      - cargo build --release --offline --package sequins-linux
      - install -Dm755 target/release/sequins-desktop /app/bin/sequins-desktop
      - install -Dm644 apps/linux/data/com.sequins.desktop.desktop /app/share/applications/com.sequins.desktop.desktop
      - install -Dm644 apps/linux/data/com.sequins.desktop.metainfo.xml /app/share/metainfo/com.sequins.desktop.metainfo.xml
      - install -Dm644 apps/linux/data/icons/hicolor/scalable/apps/com.sequins.desktop.svg /app/share/icons/hicolor/scalable/apps/com.sequins.desktop.svg
    sources:
      - type: dir
        path: ../..
      - cargo-sources.json
