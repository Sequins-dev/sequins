name: SDKs CI

on:
  push:
    branches: [main]
    paths:
      - "sdks/**"
      - ".github/workflows/sdks-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdks/**"
      - ".github/workflows/sdks-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node.js SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: sdks/node/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdks/go/go.sum
      - run: go vet ./...
      - run: go test ./...

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check test

  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdks/rust
      - name: Install protobuf
        run: sudo apt-get install -y protobuf-compiler
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test

  dotnet:
    name: .NET SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/dotnet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build

  ruby:
    name: Ruby SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: sdks/ruby
      - run: bundle exec rake test

  php:
    name: PHP SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/php
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer
      - run: composer install --no-interaction
      - run: vendor/bin/phpunit tests/

  swift:
    name: Swift SDK
    runs-on: macos-14
    defaults:
      run:
        working-directory: sdks/swift
    steps:
      - uses: actions/checkout@v4
      - run: swift build
      - run: swift test

  elixir:
    name: Elixir SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/elixir
    env:
      MIX_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17"
      - name: Cache mix deps
        uses: actions/cache@v4
        with:
          path: |
            sdks/elixir/deps
            sdks/elixir/_build
          key: mix-${{ hashFiles('sdks/elixir/mix.lock') }}
      - run: mix deps.get
      - run: mix test
